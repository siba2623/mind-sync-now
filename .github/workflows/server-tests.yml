name: Server tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ feat/sqlite-migration ]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install server dependencies
        working-directory: server
        run: |
          npm ci

      - name: Run server tests
        working-directory: server
        run: |
          npm test
