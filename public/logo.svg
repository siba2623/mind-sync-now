<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="512" height="512" rx="115" fill="url(#gradient)"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <linearGradient id="brainGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  
  <!-- Brain icon with modern design -->
  <g transform="translate(256, 256)">
    <!-- Left hemisphere -->
    <path d="M -60 -80 Q -100 -80 -120 -50 Q -130 -20 -120 10 Q -110 40 -90 60 Q -70 80 -40 85 L -40 -85 Q -50 -85 -60 -80 Z" 
          fill="url(#brainGradient)" opacity="0.9"/>
    
    <!-- Right hemisphere -->
    <path d="M 60 -80 Q 100 -80 120 -50 Q 130 -20 120 10 Q 110 40 90 60 Q 70 80 40 85 L 40 -85 Q 50 -85 60 -80 Z" 
          fill="url(#brainGradient)" opacity="0.9"/>
    
    <!-- Brain details - neural pathways -->
    <g stroke="#6366f1" stroke-width="3" fill="none" opacity="0.6">
      <!-- Left side pathways -->
      <path d="M -80 -40 Q -70 -30 -60 -40"/>
      <path d="M -90 -10 Q -80 0 -70 -10"/>
      <path d="M -85 20 Q -75 30 -65 20"/>
      <path d="M -75 50 Q -65 60 -55 50"/>
      
      <!-- Right side pathways -->
      <path d="M 80 -40 Q 70 -30 60 -40"/>
      <path d="M 90 -10 Q 80 0 70 -10"/>
      <path d="M 85 20 Q 75 30 65 20"/>
      <path d="M 75 50 Q 65 60 55 50"/>
      
      <!-- Center connection -->
      <circle cx="0" cy="0" r="15" fill="#6366f1" opacity="0.3"/>
      <circle cx="0" cy="0" r="8" fill="#ffffff"/>
    </g>
    
    <!-- Sync waves - representing synchronization -->
    <g stroke="#ffffff" stroke-width="4" fill="none" opacity="0.8">
      <path d="M -30 -100 Q -20 -110 -10 -100" stroke-linecap="round"/>
      <path d="M 10 -100 Q 20 -110 30 -100" stroke-linecap="round"/>
      
      <path d="M -35 100 Q -25 110 -15 100" stroke-linecap="round"/>
      <path d="M 15 100 Q 25 110 35 100" stroke-linecap="round"/>
    </g>
    
    <!-- Wellness dots -->
    <circle cx="-100" cy="-60" r="6" fill="#ffffff" opacity="0.7"/>
    <circle cx="100" cy="-60" r="6" fill="#ffffff" opacity="0.7"/>
    <circle cx="-105" cy="30" r="6" fill="#ffffff" opacity="0.7"/>
    <circle cx="105" cy="30" r="6" fill="#ffffff" opacity="0.7"/>
  </g>
  
  <!-- Optional: Add "MS" text at bottom -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="80" font-weight="bold" 
        fill="#ffffff" text-anchor="middle" opacity="0.9">MS</text>
</svg>
